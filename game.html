<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Lung Adventure</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&display=swap" rel="stylesheet">

</head>

<body>

<div class="background">

    <!-- Back Button -->

    <a href="index.html" class="back-button">
        ← Back
    </a>

    <div class="container">

        <h1>LUNG ADVENTURE</h1>

        <p class="subtitle">
            Complete healthy activities to unlock every alveolus!
        </p>

        <!-- Progress Bar -->

        <div class="progress-container">

            <div class="progress-bar">

                <div class="progress-fill"></div>

            </div>

            <p class="progress-text">
                0 / 10 Alveoli Unlocked
            </p>

        </div>

        <!-- Lung Image -->

        <div class="lung-map">

            <img src="lungs.jpeg" alt="Lungs" class="lungs-image">

            <!-- Start -->

            <button
                class="alveolus unlocked"
                id="alveolus1"
                style="top:18%; left:50%;">
                ▶
            </button>

            <!-- Left Lung -->

            <button
                class="alveolus locked"
                id="alveolus2"
                style="top:27%; left:33%;">
                🔒
            </button>

            <button
                class="alveolus locked"
                id="alveolus3"
                style="top:42%; left:24%;">
                🔒
            </button>

            <button
                class="alveolus locked"
                id="alveolus4"
                style="top:58%; left:28%;">
                🔒
            </button>

            <button
                class="alveolus locked"
                id="alveolus5"
                style="top:83%; left:33%;">
                🔒
            </button>

            <!-- Right Lung -->

            <button
                class="alveolus locked"
                id="alveolus6"
                style="top:27%; left:67%;">
                🔒
            </button>

            <button
                class="alveolus locked"
                id="alveolus7"
                style="top:42%; left:77%;">
                🔒
            </button>

            <button
                class="alveolus locked"
                id="alveolus8"
                style="top:58%; left:72%;">
                🔒
            </button>

            <button
                class="alveolus locked"
                id="alveolus9"
                style="top:83%; left:67%;">
                🔒
            </button>

            <!-- Trophy -->

            <button
                class="alveolus locked"
                id="alveolus10"
                style="top:96%; left:50%;">
                🏆
            </button>

        </div>

        <p class="subtitle">

            Start at the bronchi and complete healthy activities for people with Cystic Fibrosis.

            Each completed challenge unlocks another alveolus!

        </p>

    </div>

</div>

<script src="script.js"></script>

</body>

</html>
