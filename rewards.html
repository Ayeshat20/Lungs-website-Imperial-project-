<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>The Lungs</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&display=swap" rel="stylesheet">

</head>

<body>

<div class="background">

    <!-- Decorative Leaves -->
    <div class="leaf leaf-top-left"></div>
    <div class="leaf leaf-top-right"></div>
    <div class="leaf leaf-bottom-left"></div>
    <div class="leaf leaf-bottom-right"></div>

    <div class="container">

        <!-- Lungs Image -->
        <img src="Lungs mini icon.jpg" alt="Lungs" class="logo">

        <!-- Title -->
        <h1>THE LUNGS</h1>

        <p class="subtitle">
            LEARN • PLAY • BREATHE
        </p>

        <!-- GAME BUTTON -->
        <a href="game.html" class="card">

            <img src="controller.png" alt="Game" class="menu-icon">

            <span class="card-text">
                GAME
            </span>

        </a>

        <!-- REWARDS BUTTON -->
        <a href="rewards.html" class="card">

            <img src="trophy.png" alt="Rewards" class="menu-icon">

            <span class="card-text">
                REWARDS
            </span>

        </a>

        <!-- REFERENCES BUTTON -->
        <a href="references.html" class="card">

            <img src="books.png" alt="References" class="menu-icon">

            <span class="card-text">
                REFERENCES
            </span>

        </a>

        <!-- Bottom Decoration -->
        <div class="heartbeat">
            ❤
        </div>

    </div>

</div>

</html>
